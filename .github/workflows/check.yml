name: Check code quality
on: [ push, pull_request ]
jobs:
  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/project-setup
      - name: Ruff lint
        run: uv run ruff format --check

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/project-setup
      - name: Ruff lint
        run: uv run ruff check

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/project-setup
      - name: Pyright
        run: uv run pyright ./
