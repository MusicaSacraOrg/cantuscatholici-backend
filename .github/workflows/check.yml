name: Check code quality
on: [ push, pull_request ]
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/project-setup
      - name: Ruff lint
        run: uv run check

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/project-setup
      - name: Pyright
        run: uv run pyright ./

  test:
    runs-on: ubuntu-latest
    needs: [ruff, pyright]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/project-setup
      - name: Pytest
        run: uv run pytest
