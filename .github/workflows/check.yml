name: Check code quality
on: [ push, pull_request ]
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/project-setup
      - name: Ruff lint
        run: uv run ruff check

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/project-setup
      - name: Pyright
        run: uv run pyright ./
